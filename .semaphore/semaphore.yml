version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: "Enforce monthly budget \U0001F4B0"
    task:
      jobs:
        - name: Enforce limit
          commands:
            - sudo apt update && sudo apt install bc
            - infracost breakdown --path . --format json --out-file /tmp/infracost.json
            - 'monthly_cost=$(jq .projects[0].breakdown.totalMonthlyCost /tmp/infracost.json | sed ''s/"//g'')'
            - 'echo "Estimated cloud cost: ${monthly_cost}/${BUDGET_LIMIT}"'
            - 'if [ $(echo "$monthly_cost > $BUDGET_LIMIT" | bc -l) -eq 1 ]; then echo "LIMIT EXCEEEDED!"; exit 1; fi'
      secrets:
        - name: infracost
      env_vars:
        - name: BUDGET_LIMIT
          value: '1000'
      prologue:
        commands:
          - checkout
          - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
    dependencies:
      - "Tests \U0001F52C"
  - name: "Infracost PR\U0001F4B0"
    task:
      secrets:
        - name: infracost
      jobs:
        - name: Comment PRs
          commands:
            - infracost breakdown --path . --format json --out-file /tmp/infracost.json
            - infracost comment github --path=/tmp/infracost.json --repo=$SEMAPHORE_GIT_REPO_SLUG --pull-request=$SEMAPHORE_GIT_PR_NUMBER --github-token=$GITHUB_API_KEY --behavior=update
      prologue:
        commands:
          - checkout
          - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
    run:
      when: pull_request =~ '.*' and change_in('/**/*.tf')
    dependencies: []
  - name: "Infracost comment \U0001F4B0"
    dependencies: []
    task:
      jobs:
        - name: Comment commit
          commands:
            - infracost breakdown --path . --format json --out-file /tmp/infracost.json
            - infracost comment github --path=/tmp/infracost.json --repo=$SEMAPHORE_GIT_REPO_SLUG --commit=$SEMAPHORE_GIT_SHA --github-token=$GITHUB_API_KEY --behavior=update
      secrets:
        - name: infracost
      prologue:
        commands:
          - checkout
          - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
    run:
      when: change_in('/**/*.tf')
  - name: "Build \U0001F477\U0001F3FB‍♀️"
    dependencies: []
    task:
      jobs:
        - name: Make build
          commands:
            - sleep 5
  - name: "Tests \U0001F52C"
    dependencies:
      - "Build \U0001F477\U0001F3FB‍♀️"
    task:
      jobs:
        - name: Unit tests
          commands:
            - sleep 2
        - name: Integration tests
          commands:
            - sleep 3
