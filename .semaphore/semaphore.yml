version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: "Cloud costs \U0001F4B0"
    task:
      jobs:
        - name: Check budget
          commands:
            - sudo apt install bc
            - checkout
            - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
            - ./check-budget.sh
      secrets:
        - name: infracost
      env_vars:
        - name: MAX_MONTHLY_COST
          value: '700'
    dependencies: []
  - name: "Cost estimate in PR \U0001F4B0"
    task:
      secrets:
        - name: infracost
      jobs:
        - name: 'Post comment '
          commands:
            - checkout
            - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
            - ./pull-request.sh
    run:
      when: pull_request =~ '.*' and change_in('main.tf')
    dependencies: []
