version: v1.0
name: Initial Pipeline
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2004
blocks:
  - name: "Cloud costs \U0001F4B0"
    task:
      jobs:
        - name: Check budget
          commands:
            - sudo apt install bc
            - checkout
            - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
            - ./check-budget.sh
      secrets:
        - name: infracost
      env_vars:
        - name: MAX_MONTHLY_COST
          value: '700'
    dependencies:
      - "Infrastructure costs \U0001F4B0"
  - name: "Cost estimate in PR \U0001F4B0"
    task:
      secrets:
        - name: infracost
      jobs:
        - name: 'Post comment '
          commands:
            - checkout
            - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
            - ./pull-request.sh
    run:
      when: branch = 'master' and pull_request =~ '.*' and change_in('**/*.tf')
    dependencies: []
  - name: "Infrastructure costs \U0001F4B0"
    dependencies: []
    task:
      jobs:
        - name: Comment commit
          commands:
            - checkout
            - 'curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh'
            - infracost breakdown --path . --format json --out-file /tmp/infracost.json
            - infracost comment github --path=/tmp/infracost-base.json --repo=$SEMAPHORE_GIT_REPO_SLUG --commit=$SEMAPHORE_GIT_SHA --github-token=$GITHUB_API_KEY --behavior=update
      secrets:
        - name: infracost
